name: Daily Brew Agent

on:
  schedule:
    # 7:00 AM Singapore time = 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  brew:
    name: Wei Liang's Morning Brew
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run agentic loop
        env:
          VITE_SUPABASE_URL:       ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY:       ${{ secrets.VITE_SUPABASE_KEY }}
          SUPABASE_AGENT_EMAIL:    ${{ secrets.SUPABASE_AGENT_EMAIL }}
          SUPABASE_AGENT_PASSWORD: ${{ secrets.SUPABASE_AGENT_PASSWORD }}
          AGENT_USER_ID:           ${{ secrets.AGENT_USER_ID }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run loop
